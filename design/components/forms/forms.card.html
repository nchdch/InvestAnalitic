<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  html,body{margin:0}
  body{background:var(--surface-card);font-family:var(--font-sans);color:var(--text-2);padding:22px 24px}
  .group{margin-bottom:18px}
  .group:last-child{margin-bottom:0}
  .row{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .cap{font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--text-3);font-weight:600;margin-bottom:9px}
  .cols{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;align-items:end}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { Button, IconButton, Input, Select, Switch } = window.InvestAnaliticDesignSystem_81c80b;
  function Demo(){
    return (
      <div>
        <div className="group">
          <div className="cap">Button — варианты</div>
          <div className="row">
            <Button variant="primary">Добавить сделку</Button>
            <Button variant="secondary" leftIcon={<i data-lucide="download" />}>Импорт</Button>
            <Button variant="ghost">Отмена</Button>
            <Button variant="soft">Варианты</Button>
            <Button variant="danger">Удалить</Button>
            <Button variant="primary" loading>Расчёт…</Button>
          </div>
        </div>
        <div className="group">
          <div className="cap">Размеры · IconButton · Switch</div>
          <div className="row">
            <Button size="sm">sm</Button>
            <Button size="md">md</Button>
            <Button size="lg">lg</Button>
            <IconButton label="Уведомления"><i data-lucide="bell" /></IconButton>
            <IconButton variant="outlined" label="Настройки"><i data-lucide="settings" /></IconButton>
            <IconButton variant="solid" label="Добавить"><i data-lucide="plus" /></IconButton>
            <Switch label="Проактивные уведомления" defaultChecked />
          </div>
        </div>
        <div className="group">
          <div className="cap">Поля ввода</div>
          <div className="cols">
            <Input label="Тикер" placeholder="SBER" prefix={<i data-lucide="search" />} />
            <Input label="Цена" numeric suffix="₽" defaultValue="286,40" />
            <Select label="Счёт" options={[{value:'sber',label:'Сбер Инвестиции'},{value:'tbank',label:'Т-Банк Инвестиции'}]} />
          </div>
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
  setTimeout(()=>window.lucide && window.lucide.createIcons(), 60);
</script>
</body>
</html>
