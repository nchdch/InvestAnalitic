<body>
<div id="root"></div>
<script type="text/babel">
  const { AIMessage, AIComposer, Button, PnLValue } = window.InvestAnaliticDesignSystem_81c80b;

    return (
      <div>

        <AIComposer suggestions={['Как портфель за месяц?','Ближайшие дивиденды','Стоит ли ребалансировать?']} />
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
