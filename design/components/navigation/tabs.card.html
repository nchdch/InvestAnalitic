<!-- @dsCard group="Components" viewport="700x150" name="Tabs" subtitle="Line and pill variants" -->
<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  html,body{margin:0}
  body{background:var(--surface-card);font-family:var(--font-sans);color:var(--text-2);padding:24px}
  .stack{display:flex;flex-direction:column;gap:22px}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { Tabs } = window.InvestAnaliticDesignSystem_81c80b;
  function Demo(){
    const [a,setA]=React.useState('eq');
    const [b,setB]=React.useState('month');
    return (
      <div className="stack">
        <Tabs value={a} onChange={setA} items={[
          {value:'eq',label:'Акции',count:12},
          {value:'bond',label:'Облигации',count:5},
          {value:'cash',label:'Деньги'},
        ]} />
        <Tabs variant="pill" value={b} onChange={setB} items={[
          {value:'day',label:'День'},
          {value:'week',label:'Неделя'},
          {value:'month',label:'Месяц'},
          {value:'year',label:'Год'},
          {value:'all',label:'Всё время'},
        ]} />
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script>
</body>
</html>
