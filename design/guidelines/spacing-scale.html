<!-- @dsCard group="Spacing" viewport="700x170" name="Spacing scale" subtitle="4px base grid" -->
<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  html,body{margin:0}
  body{background:var(--surface-card);font-family:var(--font-sans);color:var(--text-2);padding:20px 24px}
  .lead{font-size:14px;color:var(--text-1);font-weight:600;margin-bottom:14px}
  .row{display:flex;align-items:flex-end;gap:14px;flex-wrap:wrap}
  .col{display:flex;flex-direction:column;align-items:center;gap:6px}
  .bar{background:var(--accent-soft);border:1px solid var(--azure-200);border-radius:3px}
  .n{font-size:10px;font-family:var(--font-mono);color:var(--text-3)}
  .v{font-size:10px;color:var(--text-2);font-weight:600}
</style>
</head>
<body>
  <div class="lead">Spacing — 4px base grid</div>
  <div class="row">
    <div class="col"><div class="bar" style="width:4px;height:4px"></div><div class="v">4</div><div class="n">2</div></div>
    <div class="col"><div class="bar" style="width:8px;height:8px"></div><div class="v">8</div><div class="n">4</div></div>
    <div class="col"><div class="bar" style="width:12px;height:12px"></div><div class="v">12</div><div class="n">6</div></div>
    <div class="col"><div class="bar" style="width:16px;height:16px"></div><div class="v">16</div><div class="n">7</div></div>
    <div class="col"><div class="bar" style="width:20px;height:20px"></div><div class="v">20</div><div class="n">8</div></div>
    <div class="col"><div class="bar" style="width:24px;height:24px"></div><div class="v">24</div><div class="n">9</div></div>
    <div class="col"><div class="bar" style="width:32px;height:32px"></div><div class="v">32</div><div class="n">10</div></div>
    <div class="col"><div class="bar" style="width:40px;height:40px"></div><div class="v">40</div><div class="n">11</div></div>
    <div class="col"><div class="bar" style="width:48px;height:48px"></div><div class="v">48</div><div class="n">12</div></div>
    <div class="col"><div class="bar" style="width:64px;height:64px"></div><div class="v">64</div><div class="n">13</div></div>
  </div>
</body>
</html>
