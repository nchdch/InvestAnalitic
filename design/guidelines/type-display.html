<!-- @dsCard group="Type" viewport="700x250" name="Display & headings" subtitle="Golos Text — hero figures and the heading ramp" -->
<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  html,body{margin:0}
  body{background:var(--surface-card);font-family:var(--font-sans);color:var(--text-1);padding:20px 24px}
  .item{display:flex;align-items:baseline;gap:14px;padding:7px 0;border-bottom:1px solid var(--divider)}
  .item:last-child{border-bottom:0}
  .spec{margin-left:auto;font-family:var(--font-mono);font-size:10px;color:var(--text-3);white-space:nowrap}
  .d{font-size:var(--text-display);line-height:1;font-weight:700;letter-spacing:var(--tracking-tight);font-variant-numeric:tabular-nums}
  .h1{font-size:var(--text-h1);line-height:1;font-weight:700;letter-spacing:var(--tracking-snug)}
  .h2{font-size:var(--text-h2);font-weight:600;letter-spacing:var(--tracking-snug)}
  .h3{font-size:var(--text-h3);font-weight:600}
  .h4{font-size:var(--text-h4);font-weight:600}
</style>
</head>
<body>
  <div class="item"><span class="d">2 480 350 ₽</span><span class="spec">Display · 56 / 700</span></div>
  <div class="item"><span class="h1">Портфель</span><span class="spec">H1 · 40 / 700</span></div>
  <div class="item"><span class="h2">Сбер Инвестиции</span><span class="spec">H2 · 30 / 600</span></div>
  <div class="item"><span class="h3">Облигации</span><span class="spec">H3 · 23 / 600</span></div>
  <div class="item"><span class="h4">Ближайшие выплаты</span><span class="spec">H4 · 18 / 600</span></div>
</body>
</html>
