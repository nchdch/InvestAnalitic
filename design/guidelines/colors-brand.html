<!-- @dsCard group="Colors" viewport="700x172" name="Brand · Azure" subtitle="The single brand accent + its soft tints" -->
<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  html,body{margin:0}
  body{background:var(--surface-card);font-family:var(--font-sans);color:var(--text-2);padding:20px 24px}
  .row{display:flex;gap:10px;flex-wrap:wrap}
  .sw{flex:1 1 0;min-width:64px;border-radius:var(--radius-md);overflow:hidden;border:1px solid var(--border-1)}
  .chip{height:54px}
  .meta{padding:6px 8px;font-size:11px;line-height:1.3}
  .name{color:var(--text-1);font-weight:600}
  .val{color:var(--text-3);font-family:var(--font-mono);font-size:10px}
  .lead{display:flex;align-items:baseline;gap:10px;margin-bottom:12px}
  .lead h3{font-size:14px}
  .tag{font-size:11px;color:var(--text-3)}
</style>
</head>
<body>
  <div class="lead"><h3>Azure — brand accent</h3><span class="tag ia-mono">--accent · azure-600</span></div>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--azure-700)"></div><div class="meta"><div class="name">700</div><div class="val">accent-hover</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--azure-600)"></div><div class="meta"><div class="name">600</div><div class="val">accent</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--azure-500)"></div><div class="meta"><div class="name">500</div><div class="val">azure-500</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--azure-400)"></div><div class="meta"><div class="name">400</div><div class="val">azure-400</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--azure-200)"></div><div class="meta"><div class="name">200</div><div class="val">soft-hover</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--azure-100)"></div><div class="meta"><div class="name">100</div><div class="val">accent-soft</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--azure-50)"></div><div class="meta"><div class="name">50</div><div class="val">azure-50</div></div></div>
  </div>
</body>
</html>
